# =============================================================================
# ATAI Demo — Unified Docker Compose
# =============================================================================
# Usage:
#   docker compose up -d          # start all services
#   docker compose down            # stop (preserves volumes)
#   docker compose down -v         # stop and delete all data
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Application — ChromaDB (vector store for RAG)
  # ---------------------------------------------------------------------------
  chromadb:
    image: quay.io/mellea/chromadb:latest
    pull_policy: if_not_present
    restart: always
    ports:
      - 8100:8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Application — Langflow Intrinsics
  # ---------------------------------------------------------------------------
  langflow-intrinsics:
    image: quay.io/mellea/langflow-intrinsics:latest
    pull_policy: if_not_present
    restart: always
    depends_on:
      chromadb:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - 7860:7860
    environment:
      LANGFLOW_AUTO_LOGIN: ${LANGFLOW_AUTO_LOGIN:-true}
      LANGFLOW_SUPERUSER: ${LANGFLOW_SUPERUSER:-admin}
      LANGFLOW_SUPERUSER_PASSWORD: ${LANGFLOW_SUPERUSER_PASSWORD:-admin123}
      LANGFLOW_LOAD_FLOWS_PATH: /app/flows
      LANGFLOW_COMPONENTS_PATH: /app/components
    volumes:
      - ./flows:/app/flows:ro
