<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Visualization</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/visualization.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="flowTitle">Flow Visualization</h1>
            <div class="trace-selector-wrapper">
                <button id="traceSelectorButton" class="trace-selector-button" title="Change trace">
                    <span id="traceSelectorLabel">Change trace</span>
                    <span class="trace-selector-arrow">▾</span>
                </button>
                <div id="traceDropdown" class="trace-dropdown hidden">
                    <div id="traceDropdownContent" class="trace-dropdown-content">
                        <!-- Traces will be populated here -->
                    </div>
                </div>
            </div>
            <button id="refreshButton" class="refresh-button" onclick="loadVisualization()" title="Load latest trace">
                <span id="refreshIcon">↻</span>
            </button>
            <div class="header-spacer"></div>
            <div class="config-wrapper">
                <button id="configButton" class="config-button" title="Settings">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>
                <div id="configDropdown" class="config-dropdown hidden">
                    <div class="config-dropdown-content">
                        <div class="config-section">
                            <label class="config-label" for="langflowApiKey">LangFlow API Key</label>
                            <div class="config-input-wrapper">
                                <input type="password" id="langflowApiKey" class="config-input" placeholder="Enter your API key">
                                <button class="config-input-toggle" id="apiKeyToggle" title="Show/hide key">
                                    <svg id="apiKeyEyeIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="loading-state hidden">
            <div class="spinner-large"></div>
            <p>Loading visualization...</p>
        </div>

        <!-- Setup State (shown when no API key) -->
        <div id="setupState" class="setup-state hidden">
            <div class="setup-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            <h2>Welcome to Flow Visualization</h2>
            <p>Enter your LangFlow API key to get started.</p>
            <div class="setup-input-wrapper">
                <input type="password" id="setupApiKeyInput" class="setup-input" placeholder="Paste your LangFlow API key">
                <button class="setup-input-toggle" id="setupApiKeyToggle" title="Show/hide key">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
            <p id="setupErrorMessage" class="setup-error hidden">Invalid API key. Please check and try again.</p>
            <button id="setupSubmitButton" class="setup-button">
                Load Visualization
            </button>
        </div>

        <!-- Error State -->
        <div id="errorState" class="error-state hidden">
            <h2>Error Loading Visualization</h2>
            <p id="errorMessage">An error occurred while loading the visualization.</p>
            <button class="refresh-button" onclick="loadVisualization()">Try Again</button>
        </div>

        <!-- Visualization (hidden until loaded) -->
        <div id="visualizationContainer" class="svg-wrapper hidden">
            <div class="zoom-controls hidden" id="zoomControls">
                <button class="zoom-button" id="zoomIn" title="Zoom In">+</button>
                <button class="zoom-button" id="zoomOut" title="Zoom Out">−</button>
            </div>

            <svg id="flowChart" viewBox="50 170 790 500" xmlns="http://www.w3.org/2000/svg">
            <!-- Definitions -->
            <defs>
                <!-- Arrow marker - small subtle style -->
                <marker id="arrowhead" markerWidth="4" markerHeight="4" refX="3.5" refY="2" orient="auto">
                    <polygon points="0 0.5, 4 2, 0 3.5" fill="#9ca3af" />
                </marker>

                <!-- Shadow filter for speech bubbles -->
                <filter id="bubbleShadow" x="-50%" y="-50%" width="200%" height="200%">
                    <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="rgba(15, 23, 42, 0.12)" />
                </filter>

                <!-- Shadow filter for document icons -->
                <filter id="documentShadow" x="-50%" y="-50%" width="200%" height="200%">
                    <feDropShadow dx="0" dy="3" stdDeviation="10" flood-color="rgba(15, 23, 42, 0.1)" />
                </filter>

                <!-- Shadow filter for component containers -->
                <filter id="componentShadow" x="-50%" y="-50%" width="200%" height="200%">
                    <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="rgba(15, 23, 42, 0.15)" />
                </filter>
            </defs>

            <!--
                Layout Variables:
                - Minimalist design inspired by academic paper figures
                - Simple outline icons, thin arrows, text labels
                - Components, arrows, and speech bubbles dynamically generated from flowComponents JSON
                - Arrow positions dynamically calculated based on icon size
                - All values configurable via config object in JavaScript
            -->

            <!-- Components will be dynamically generated here -->
            <g id="componentsGroup"></g>

            <!-- Arrows will be dynamically generated here -->
            <g id="arrowsGroup"></g>

            <!-- Labels will be dynamically generated here (after arrows for proper z-ordering) -->
            <g id="labelsGroup"></g>

            <!-- Speech bubbles will be dynamically generated here -->
            <g id="speechBubblesGroup"></g>

            <!-- Document icons will be dynamically generated here -->
            <g id="documentsGroup"></g>

        </svg>
        </div>

    </div>

    <!-- Properties Panel -->
    <div class="properties-panel" id="propertiesPanel">
        <div class="properties-panel-header">
            <h2>Component Properties</h2>
            <button class="properties-panel-close" id="closePanelBtn">&times;</button>
        </div>
        <div class="properties-panel-content" id="propertiesPanelContent">
            <!-- Content will be dynamically generated -->
        </div>
    </div>

    <script src="/js/visualization.js"></script>
</body>
</html>
